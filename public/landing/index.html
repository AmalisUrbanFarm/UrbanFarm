<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amalis Urban Farm 4.0 — In arrivo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  background:#ffffff;
  color:#1d1d1f;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
  overflow:hidden;
}

/* sfondo glow */
.glow{
  position:absolute;
  width:700px;
  height:700px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(26,127,78,.08) 0%,transparent 70%);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* container */
.container{
  position:relative;
  z-index:2;
  max-width:600px;
  padding:20px;
}

/* logo */
.logo{
  font-size:18px;
  font-weight:600;
  margin-bottom:30px;
}

/* badge */
.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:#e8f5ee;
  color:#1a7f4e;
  padding:6px 16px;
  border-radius:100px;
  font-size:12px;
  font-weight:500;
  margin-bottom:30px;
}

.dot{
  width:6px;
  height:6px;
  background:#1a7f4e;
  border-radius:50%;
  animation:blink 2s infinite;
}

@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:.3}
}

/* titolo */
h1{
  font-size:clamp(40px,6vw,72px);
  font-weight:700;
  letter-spacing:-0.04em;
  margin-bottom:20px;
}

.green{
  color:#1a7f4e;
}

/* testo */
p{
  font-size:18px;
  color:#6e6e73;
  line-height:1.6;
  margin-bottom:40px;
}

/* input email */
.form{
  display:flex;
  border:1px solid #e5e5e7;
  border-radius:50px;
  overflow:hidden;
  background:#fff;
  box-shadow:0 4px 20px rgba(0,0,0,.05);
}

input{
  flex:1;
  border:none;
  padding:14px 20px;
  font-size:14px;
  outline:none;
}

button{
  background:#1a7f4e;
  color:#fff;
  border:none;
  padding:0 24px;
  cursor:pointer;
  font-size:14px;
  font-weight:500;
}

button:hover{
  background:#0d6a3d;
}

/* footer */
.footer{
  position:absolute;
  bottom:20px;
  font-size:12px;
  color:#a1a1a6;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="container">

  <div class="logo"> Amalis Urban Farm 4.0</div>

  <div class="badge">
    <div class="dot"></div>
    Sito in lavorazione
  </div>

  <h1>Siamo quasi<br><span class="green">pronti.</span></h1>

  <p>
    Stiamo preparando qualcosa di importante.<br>
    Lascia la tua email per essere tra i primi ad accedere.
  </p>

  <div class="form">
    <input type="email" placeholder="La tua email">
    <button>Accedi in anteprima</button>
  </div>

</div>

<div class="footer">
  © 2026 amalisfarm.com
</div>

</body>
</html>
